// NanoBanana Pro via Google Gemini (placeholder - wire up your backend)
let imgGenRatio = '1:1';
let imgGenLoading = false;
let imgGenResult = null;
let imgGenModel = 'nanobananaPro';
let imgGenCount = 1;

function setImgCount(btn, count) {
  imgGenCount = count;
  btn.parentElement.querySelectorAll('.img-gen-opt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function setImgRatio(btn, ratio) {
  imgGenRatio = ratio;
  document.querySelectorAll('.img-gen-opt').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  // Update preview aspect ratio
  const preview = document.getElementById('img-gen-preview');
  if (preview) {
    const ratios = {'1:1':'1/1', '16:9':'16/9', '9:16':'9/16', '4:5':'4/5'};
    preview.style.aspectRatio = ratios[ratio] || '1/1';
  }
}

async function generateImage() {
  if (!requirePro('Image Generation')) return;
  
  const promptText = (document.getElementById('p-out')?.dataset?.full || '').trim();
  if (!promptText || promptText.includes('[SUBJECT]')) {
    toast('Fill in some fields first', 'warn');
    return;
  }
  
  if (imgGenLoading) return;
  imgGenLoading = true;
  
  const preview = document.getElementById('img-gen-preview');
  const status = document.getElementById('img-gen-status');
  const genBtn = document.getElementById('img-gen-btn');
  const dlBtn = document.getElementById('img-download-btn');
  
  if (preview) preview.innerHTML = '<div class="img-gen-loading"><div class="spinner"></div><div>Generating image...</div></div>';
  if (genBtn) { genBtn.disabled = true; genBtn.textContent = '⏳ Generating...'; }
  if (status) status.innerHTML = '';
  if (dlBtn) dlBtn.style.display = 'none';
  
  try {
    const result = await callImageGen(promptText, {
      ratio: imgGenRatio,
      generatorId: currentGenerator,
      model: imgGenModel,
      count: imgGenCount,
      templateId: TEMPLATES[currentTemplate].id,
      referencePhoto: referencePhoto ? referencePhoto.data : null,
      referenceUrl: referenceImageUrl || null,
      tattooMockup: TEMPLATES[currentTemplate].id === 'tattoo' ? { clientImage: tattooClientImage, placement: tattooPlacement, skinTone: variations[currentVariation].values.skintone || null } : null
    });
    
    imgGenResult = result;
    if (preview) {
      preview.innerHTML = `<img src="${result.imageUrl}" alt="Generated image" onclick="window.open(this.src,'_blank')">`;
    }
    if (dlBtn) dlBtn.style.display = '';
    addToMediaGallery(result.imageUrl, promptText, {model:imgGenModel, ratio:imgGenRatio});
    toast('Image generated & saved to Media!', 'success');
  } catch (e) {
    if (preview) {
      preview.innerHTML = `<div class="img-gen-placeholder"><div class="icon">⚠️</div><div class="text">${e.message}</div></div>`;
    }
    if (status) status.innerHTML = '<div class="img-gen-error">' + e.message + '</div>';
  }
  
  imgGenLoading = false;
  if (genBtn) { genBtn.disabled = false; genBtn.textContent = '🎨 Generate Image'; }
}

function downloadGenImage() {
  if (!imgGenResult || !imgGenResult.imageUrl) return;
  const a = document.createElement('a');
  a.href = imgGenResult.imageUrl;
  a.download = 'savage-' + TEMPLATES[currentTemplate].id + '-' + Date.now() + '.png';
  a.click();
  toast('Downloading image', 'success');
}

// ========== KEYBOARD SHORTCUTS (UX #29) ==========
document.addEventListener('keydown',function(e){
  // 1-7 for tabs (when not in input)
  if(!e.target.matches('input,textarea,select')&&!e.target.isContentEditable&&!e.ctrlKey&&!e.metaKey){
    const num=parseInt(e.key);
    if(num>=1&&num<=9){e.preventDefault();switchTab(num-1);return;}
    if(e.key==='0'){e.preventDefault();switchTab(9);return;}
  }
  // Ctrl+Shift+C = copy prompt
  if((e.ctrlKey||e.metaKey)&&e.shiftKey&&e.key==='C'){e.preventDefault();if(currentTab===1)cpPrompt();return;}
  // Ctrl+S = save to history
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();if(currentTab===1)saveHist();return;}
});

function renderBulk(){
  const c=document.getElementById('v-bulk');c.innerHTML='';
  c.insertAdjacentHTML('beforeend','<div class="kw-hint">Paste a list of subjects (one per line). Hit generate to create a prompt for each one using your current style, palette, and settings.</div>');
  const genName=GENERATORS.find(g=>g.id===currentGenerator);
  c.insertAdjacentHTML('beforeend',`${genName&&genName.id!=='raw'?'<div style="margin-bottom:8px"><span class="bdg bdg-m" style="display:inline-block">🎯 ${genName.name}</span></div>':''}<textarea class="bulk-ta" id="bulk-ta" placeholder="lion\ntiger\neagle\nwolf\nsnake"></textarea><button class="quick-btn" onclick="genBulk()" style="margin-bottom:14px">⚡ Generate All</button><div id="bulk-out"></div>`);
}
function genBulk(){
  const ta=document.getElementById('bulk-ta').value.trim();
  if(!ta)return;
  const subjects=ta.split('\n').filter(s=>s.trim());
  const tpl=TEMPLATES[currentTemplate];
  const bTplPresets=(TEMPLATE_STYLES[TEMPLATES[currentTemplate].id]||[]).flatMap(c=>c.styles).filter(s=>s.active);
  const actSty=[...bTplPresets,...styles.filter(s=>s.active)];
  const styTxt=actSty.map(s=>s.content).join('\n\n');
  const gt=garTxt(),mt=mockTxt(),kwTxt=selectedKeywords.length?'Keywords: '+selectedKeywords.join(', ')+'.':'';
  const bPalObjs=selectedPalettes.map(n=>PALETTES.find(p=>p.n===n)).filter(Boolean);
  const bPalTxt=bPalObjs.length?'Color palette: '+bPalObjs.map(p=>p.c.join(', ')+' ('+p.t+')').join(' + '):'';

  const out=document.getElementById('bulk-out');out.innerHTML='';
  const allPrompts=[];

  subjects.forEach((subj,i)=>{
    const firstKey=tpl.f[0]?tpl.f[0].k:'subject';
    const vals={};vals[firstKey]=subj.trim();
    const fp=tpl.b(vals);
    let parts=[];if(styTxt)parts.push(styTxt);if(gt)parts.push(gt);if(mt)parts.push(mt);parts.push(fp);if(bPalTxt)parts.push(bPalTxt);if(kwTxt)parts.push(kwTxt);
    // Apply generator format (Fix #5)
    const gen=GENERATORS.find(g=>g.id===currentGenerator)||GENERATORS[GENERATORS.length-1];
    let combined='';
    if(gen.id==='raw'){combined=parts.join('\n\n');}
    else{let cleanParts=parts.map(p=>p.replace(/,\s*--no\s+.*$/,''));const noMatch=fp.match(/--no\s+(.+)$/);let avoidStr=noMatch?noMatch[1]:'';combined=gen.format(cleanParts,avoidStr);}
    vars.forEach(v=>{combined=combined.replaceAll('{'+v.token+'}',v.value);});
    allPrompts.push(combined);

    out.insertAdjacentHTML('beforeend',`<div class="bulk-out"><div class="bulk-hdr"><span class="bulk-idx">#${i+1} — ${escapeHtml(subj.trim())}</span><button class="hb hb-c" onclick="clipCopy(document.getElementById('bp-${i}').textContent,this)">Copy</button></div><div class="bulk-body" id="bp-${i}">${escapeHtml(combined)}</div></div>`);
  });

  out.insertAdjacentHTML('beforeend',`<button class="quick-btn" style="margin-top:8px" onclick="clipCopy(document.querySelectorAll('.bulk-body').length?Array.from(document.querySelectorAll('.bulk-body')).map(e=>e.textContent).join('\n\n---\n\n'):'',this)">📋 Copy All ${subjects.length} Prompts</button>`);
}

let diffA=-1,diffB=-1;
function toggleDiff(idx){
  if(diffA===-1){diffA=idx;}
  else if(diffB===-1&&idx!==diffA){diffB=idx;showDiff();}
  else{diffA=idx;diffB=-1;}
  renderHist();
}
function showDiff(){
  if(diffA<0||diffB<0)return;
  const a=history[diffA].prompt,b=history[diffB].prompt;
  const aw=a.split(/\s+/),bw=b.split(/\s+/);
  const aSet=new Set(aw),bSet=new Set(bw);
  const onlyA=aw.filter(w=>!bSet.has(w));
  const onlyB=bw.filter(w=>!aSet.has(w));
  const shared=aw.filter(w=>bSet.has(w));
  document.getElementById('mo-root').innerHTML=`<div class="mo-bg" onclick="if(event.target===this)closeMo()"><div class="mo"><h3>Prompt Diff</h3><p><strong style="color:#FF4D6D">Only in A:</strong> ${onlyA.join(' ') || 'nothing'}</p><p><strong style="color:#22C55E">Only in B:</strong> ${onlyB.join(' ') || 'nothing'}</p><p><strong style="color:#888">Shared:</strong> ${shared.length} words in common</p><div class="mo-a"><button class="mo-s" onclick="diffA=-1;diffB=-1;closeMo();renderHist()">Close</button></div></div></div>`;
}

function showAddPhrase(){document.getElementById('custom-phrase-form').style.display='block';}
function saveCustomPhrase(){
  const n=document.getElementById('cp-name').value.trim();
  const t=document.getElementById('cp-text').value.trim();
  if(!n||!t)return;
  userPhrases.push({l:n,p:t});
  saveLocal();
  document.getElementById('custom-phrase-form').style.display='none';
  renderSettings();
  toast('Phrase saved!','success');
}

// ========== EXPORT / IMPORT ==========
function shareLink(){
  const text=document.getElementById('p-out').dataset.full;
  if(!text)return;
  const data=btoa(unescape(encodeURIComponent(JSON.stringify({p:text,t:TEMPLATES[currentTemplate].id,s:styles.filter(s=>s.active).map(s=>s.name)}))));
  const url=window.location.origin+window.location.pathname+'#share='+data;
  if(url.length>2000)toast('Warning: Link is very long ('+url.length+' chars) and may get truncated when shared','warn',4000);
  clipCopy(url,document.getElementById('share-b'));
}
function loadShare(){
  const hash=window.location.hash;
  if(hash.includes('share=')){
    try{
      const b64=hash.split('share=')[1].split('&')[0];
      const data=JSON.parse(decodeURIComponent(escape(atob(b64))));
      if(data.p){
        const tIdx=TEMPLATES.findIndex(t=>t.id===data.t);
        currentTemplate=tIdx>=0?tIdx:(TEMPLATES.findIndex(t=>t.id==='freestyle')||0);
        const firstKey=TEMPLATES[currentTemplate].f[0]?TEMPLATES[currentTemplate].f[0].k:'subject';
        const vals={};vals[firstKey]=data.p;
        variations=[{id:1,values:vals}];currentVariation=0;
        if(data.s)data.s.forEach(sn=>{const si=styles.findIndex(s=>s.name===sn);if(si>=0)styles[si].active=true;});
        window.location.hash='';
        switchTab(1);
      }
    }catch(e){}
  }
}
function exportLocal(){
  const tplStyState={};Object.keys(TEMPLATE_STYLES).forEach(k=>{tplStyState[k]=TEMPLATE_STYLES[k].map(cat=>cat.styles.map(s=>s.active));});
  const data=JSON.stringify({styles,history,projects,vars,selectedKeywords,selectedPalettes,userPhrases,tplStyState,currentGenerator,recipes,customPalettes,mediaGallery,v:9},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='savage-prompt-builder-backup.json';a.click();
}
function showImport(){
  document.getElementById('mo-root').innerHTML=`<div class="mo-bg" onclick="if(event.target===this)closeMo()"><div class="mo"><h3>Import Data</h3><p>Paste exported JSON. Merges with existing (no dupes).</p><textarea id="imp-ta" placeholder="Paste JSON..."></textarea><div class="mo-a"><button class="mo-p" onclick="doImport()">Import</button><button class="mo-s" onclick="closeMo()">Cancel</button></div></div></div>`;
}
function closeMo(){document.getElementById('mo-root').innerHTML='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeMo();});
function doImport(){
  try{const d=JSON.parse(document.getElementById('imp-ta').value);
  if(d.styles){const ns=new Set(styles.map(s=>s.name));d.styles.forEach(s=>{if(!ns.has(s.name))styles.push(s);});}
  if(d.history){const ids=new Set(history.map(h=>h.id));d.history.forEach(h=>{if(!ids.has(h.id))history.push(h);});}
  if(d.vars){const ts=new Set(vars.map(v=>v.token));d.vars.forEach(v=>{if(!ts.has(v.token))vars.push(v);});}
  if(d.userPhrases){const el=new Set(userPhrases.map(p=>p.l));d.userPhrases.forEach(p=>{if(!el.has(p.l))userPhrases.push(p);});}
  if(d.tplStyState){Object.keys(d.tplStyState).forEach(k=>{if(TEMPLATE_STYLES[k]&&d.tplStyState[k]&&Array.isArray(d.tplStyState[k][0])){d.tplStyState[k].forEach((catActive,ci)=>{if(TEMPLATE_STYLES[k][ci])catActive.forEach((a,si)=>{if(TEMPLATE_STYLES[k][ci].styles[si])TEMPLATE_STYLES[k][ci].styles[si].active=a;});});}});}
  if(d.currentGenerator)currentGenerator=d.currentGenerator;
  if(d.customPalettes){const en=new Set(customPalettes.map(p=>p.n));d.customPalettes.forEach(p=>{if(!en.has(p.n))customPalettes.push(p);});}
  if(d.mediaGallery){const mids=new Set(mediaGallery.map(m=>m.id));d.mediaGallery.forEach(m=>{if(!mids.has(m.id))mediaGallery.push(m);});}
  if(d.recipes){const ids=new Set(recipes.map(r=>r.id));d.recipes.forEach(r=>{if(!ids.has(r.id))recipes.push(r);});try{localStorage.setItem('spb_recipes',JSON.stringify(recipes));}catch(e){}}
  saveLocal();closeMo();init(true);toast('Import complete!','success');}catch(e){toast('Invalid JSON','error');}
}

// ========== UTILS ==========
function clipCopy(text,btn){
  if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showOk(btn));
  else{const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showOk(btn);}
}
function showOk(b){if(!b)return;const orig=b.textContent;b.textContent='✓ Copied';b.classList.add('ok');setTimeout(()=>{b.textContent=orig;b.classList.remove('ok');},2e3);}

init();
</script>

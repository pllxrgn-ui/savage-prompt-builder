<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Savage Prompt Builder Mega Pro</title>
<style>
:root{
  --bg-base:#0D0D0D;--bg-1:#111;--bg-2:#141414;--bg-3:#1a1a1a;--bg-input:#0e0e14;
  --border-1:#2a2a2a;--border-2:#333;--border-3:#222;--border-4:#1e1e1e;
  --text-1:#fff;--text-2:#ccc;--text-3:#888;--text-4:#666;--text-5:#555;--text-6:#444;
  --accent:#FF4D6D;--accent-bg:#1a0a10;--accent-hover:#e83d5e;
  --accent2:#A78BFA;--accent2-bg:#0e0e14;
  --success:#22C55E;--success-bg:#0a1a0a;
  --warn:#FBBF24;--warn-bg:#1a1800;
  --info:#34D399;--info-bg:#0a1a0a;
  --mockup:#FF6B35;
  --card-shadow:none;
}
body.light{
  --bg-base:#f5f5f5;--bg-1:#fff;--bg-2:#fff;--bg-3:#f0f0f0;--bg-input:#fafaff;
  --border-1:#e0e0e0;--border-2:#ccc;--border-3:#ddd;--border-4:#eee;
  --text-1:#111;--text-2:#333;--text-3:#666;--text-4:#888;--text-5:#999;--text-6:#bbb;
  --accent-bg:#fff0f3;--accent-hover:#d63a56;
  --accent2-bg:#f5f0ff;
  --success-bg:#f0fdf4;--warn-bg:#fffbeb;--info-bg:#ecfdf5;
  --card-shadow:0 1px 3px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:var(--bg-base);color:var(--text-1);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{border-bottom:1px solid var(--border-3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-title{font-size:16px;font-weight:800;letter-spacing:-.5px}
.hdr-title .a{color:var(--accent)}
.hdr-sub{font-size:10px;color:var(--text-5);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-btn{padding:5px 10px;border-radius:5px;border:1px solid var(--border-2);background:0;color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.hdr-btn:hover{border-color:var(--text-5);color:var(--text-2)}
.user-badge{font-size:10px;color:#4285f4;padding:3px 8px;background:#4285f411;border-radius:4px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg-3);border-radius:7px;padding:2px;overflow-x:auto}
.tab{padding:6px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:0;color:var(--text-4);transition:all .15s;white-space:nowrap}
.tab.on{background:var(--accent);color:var(--text-1)}

.ctn{max-width:760px;margin:0 auto;padding:14px 14px 50px}

/* SECTION LABELS */
.sl{display:flex;align-items:center;gap:8px;margin:18px 0 8px;cursor:pointer;user-select:none}
.sl:first-child{margin-top:0}
.sl-t{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--accent);white-space:nowrap}
.sl-l{flex:1;height:1px;background:var(--border-1)}
.sl-arr{font-size:8px;color:var(--text-5);transition:transform .2s;margin-left:4px}
.sl.collapsed .sl-arr{transform:rotate(-90deg)}
.sl+.sec-body{transition:none}
.sl.collapsed+.sec-body{display:none}

/* TEMPLATE ROW */
.tpl-r{display:flex;gap:6px;overflow-x:auto;padding-bottom:5px;margin-bottom:12px}
.tpl-r::-webkit-scrollbar{height:3px}
.tpl-r::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.tpl{flex-shrink:0;padding:7px 12px;border-radius:8px;border:2px solid var(--border-1);background:var(--bg-2);color:var(--text-3);cursor:pointer;font-size:11px;font-weight:600;text-align:left;min-width:100px;transition:all .15s;position:relative}
.tpl.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.tpl .e{font-size:14px;margin-bottom:1px}
.tpl .d{font-size:8px;font-weight:400;color:var(--text-5);margin-top:1px}
.tpl.on .d{color:#ff8fa8}

/* GARMENT */
.gar-bar{display:flex;gap:5px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.gar-lbl{font-size:10px;color:var(--text-4);font-weight:600;margin-right:3px}
.g-b{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.g-b.a-d{border-color:var(--text-5);background:var(--bg-3);color:var(--text-1)}
.g-b.a-l{border-color:#fbbf24;background:var(--warn-bg);color:#fbbf24}
.g-b:hover{border-color:var(--text-6)}

/* MOCKUP BTN */
.mock-bar{display:flex;gap:5px;margin-bottom:12px;align-items:center}
.mock-btn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.mock-btn.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.mock-btn:hover{border-color:var(--text-6)}

/* STYLES BOX */
.stb{background:var(--bg-1);border:1px solid var(--border-1);border-radius:9px;overflow:hidden;margin-bottom:16px}
.st-h{padding:10px 12px;border-bottom:1px solid var(--border-3);display:flex;align-items:center;justify-content:space-between}
.st-hl{display:flex;align-items:center;gap:6px}
.st-ll{font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:.5px}
.st-c{font-size:8px;color:var(--text-5);background:var(--border-4);padding:2px 6px;border-radius:6px}
.ab{padding:4px 10px;border-radius:4px;border:1.5px dashed var(--text-6);background:0;color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.ab:hover{border-color:var(--accent2);color:var(--accent2)}
.st-body{max-height:340px;overflow-y:auto}
.st-body::-webkit-scrollbar{width:3px}
.st-body::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:3px}
.st-empty{padding:14px;text-align:center;color:var(--text-6);font-size:11px}

.si{border-bottom:1px solid var(--border-4)}.si:last-child{border-bottom:none}
.si-h{display:flex;align-items:center;gap:7px;padding:7px 12px;cursor:pointer;transition:background .1s}
.si-h:hover{background:var(--bg-3)}
.si-ck{width:16px;height:16px;border-radius:3px;border:2px solid #444;background:0;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:9px;color:var(--text-1)}
.si-ck.on{border-color:var(--accent2);background:var(--accent2)}
.si-ck .ck{display:none}.si-ck.on .ck{display:block}
.si-i{flex:1;min-width:0}
.si-n{font-size:11px;font-weight:600;color:var(--text-2)}
.si-p{font-size:9px;color:var(--text-5);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-tg{font-size:7px;padding:1px 4px;border-radius:2px;background:#A78BFA22;color:var(--accent2);font-weight:600;margin-left:4px}
.si-a{display:flex;gap:2px}
.si-b{padding:2px 5px;border-radius:2px;border:none;cursor:pointer;background:0;color:var(--text-5);font-size:9px;transition:all .1s}
.si-b:hover{background:var(--border-4);color:var(--text-2)}
.si-b.del:hover{color:var(--accent)}

.sf{padding:12px;background:var(--bg-input);border-top:1px solid var(--border-1)}
.sf-r{margin-bottom:6px}
.sf-l{font-size:9px;font-weight:600;color:var(--accent2);margin-bottom:2px;letter-spacing:.3px}
.sf-i{width:100%;padding:7px 9px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:11px;font-family:inherit;outline:none}
.sf-i:focus{border-color:var(--accent2)}
.sf-t{width:100%;padding:7px 9px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:10px;font-family:'Courier New',monospace;outline:none;resize:vertical;min-height:60px;line-height:1.4}
.sf-t:focus{border-color:var(--accent2)}
.sf-a{display:flex;gap:5px;margin-top:8px}
.sf-s{padding:6px 15px;border-radius:4px;border:none;cursor:pointer;background:var(--accent2);color:var(--text-1);font-size:11px;font-weight:700}
.sf-c{padding:6px 12px;border-radius:4px;border:1px solid var(--border-2);background:0;color:var(--text-3);font-size:11px;font-weight:600;cursor:pointer}

/* FIELDS */
.flds{display:flex;flex-direction:column;gap:12px}
.fl{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.fd{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.fn{font-size:10px;font-weight:700;letter-spacing:.4px}
.fq{font-size:10px;color:var(--text-4)}
.fi{width:100%;padding:9px 11px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--fc)}.fi.hv{background:var(--bg-3)}

/* VARIATIONS */
.vb{display:flex;align-items:center;gap:6px;margin-top:16px;margin-bottom:6px;flex-wrap:wrap}
.vt{padding:5px 12px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-2);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.vt.on{border-color:var(--accent);background:var(--accent-bg);color:var(--accent)}
.va{padding:5px 9px;border-radius:5px;border:1.5px dashed var(--text-6);background:0;color:var(--text-4);font-size:10px;cursor:pointer}
.va:hover{border-color:var(--accent);color:var(--accent)}
.vd{padding:3px 6px;border-radius:3px;border:none;background:0;color:var(--text-6);font-size:9px;cursor:pointer;margin-left:-3px}
.vd:hover{color:var(--accent)}

/* PROMPT OUTPUT */
.pb{margin-top:6px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:9px;overflow:hidden}
.p-h{padding:9px 12px;border-bottom:1px solid var(--border-1);display:flex;align-items:center;justify-content:space-between}
.p-l{font-size:10px;font-weight:700;color:var(--accent);letter-spacing:.5px}
.p-a{display:flex;gap:5px;align-items:center}
.p-st{background:none;border:none;cursor:pointer;font-size:14px;color:var(--text-6);transition:color .15s;padding:0 3px}
.p-st.on{color:var(--warn)}
.p-cl{font-size:9px;color:var(--text-5);background:none;border:none;cursor:pointer;padding:2px 4px}
.p-cl:hover{color:var(--text-3)}
.p-t{padding:12px;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;color:var(--text-5);min-height:40px;word-break:break-word;white-space:pre-wrap}
.p-t.has{color:#e0e0e0}
.p-sy{color:var(--accent2)}.p-fl{color:#e0e0e0}.p-gr{color:var(--info)}.p-mk{color:var(--mockup)}
.p-f{padding:10px 12px;border-top:1px solid var(--border-1);display:flex;flex-direction:column;gap:8px}
.act-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.act-row .act-label{font-size:8px;font-weight:700;color:var(--text-5);text-transform:uppercase;letter-spacing:.5px;margin-right:2px;white-space:nowrap}
.act-btn{padding:8px 14px;border-radius:7px;border:1px solid var(--border-2);background:var(--bg-1);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.act-btn:hover{border-color:var(--text-5);color:var(--text-2);transform:translateY(-1px)}
.act-btn.hero{flex:1;justify-content:center;padding:11px 16px;font-size:12px;font-weight:700;border:none}
.act-btn.hero-primary{background:var(--accent);color:#fff}
.act-btn.hero-primary:hover{background:#E0435F}
.act-btn.hero-gen{background:linear-gradient(135deg,#34D399,#22C55E);color:#fff;border:none}
.act-btn.hero-gen:hover{background:linear-gradient(135deg,#22C55E,#16A34A)}
.act-btn.save{border-color:#60A5FA44;color:#60A5FA;background:#60A5FA08}
.act-btn.save:hover{background:#60A5FA18;border-color:#60A5FA}
.act-btn.iterate{border-color:#22C55E44;color:#22C55E;background:#22C55E08}
.act-btn.iterate:hover{background:#22C55E18;border-color:#22C55E}
.act-btn.recipe{border-color:#FBBF2444;color:#FBBF24;background:#FBBF2408}
.act-btn.recipe:hover{background:#FBBF2418;border-color:#FBBF24}
.act-btn.ai{border-color:#A78BFA44;color:#A78BFA;background:linear-gradient(135deg,#A78BFA08,#7C3AED08)}
.act-btn.ai:hover{background:linear-gradient(135deg,#A78BFA18,#7C3AED18);border-color:#A78BFA}
.act-btn.util{padding:6px 10px;font-size:9px;color:var(--text-4);border-color:var(--border-1)}
.cb{flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;background:var(--accent);color:var(--text-1);font-size:12px;font-weight:700;letter-spacing:.3px;transition:background .2s}
.cb.ok{background:var(--success)}.cb:hover:not(.ok){background:#e83d5e}
.shb{padding:9px 14px;border-radius:6px;border:1px solid var(--border-2);background:0;color:var(--text-3);font-size:11px;font-weight:600;cursor:pointer}
.shb:hover{border-color:var(--text-5);color:var(--text-2)}

/* NOTES & SCORE */
.nr{padding:0 12px 8px;display:flex;gap:5px;align-items:center}
.ni{flex:1;padding:6px 9px;border-radius:5px;border:1px solid var(--border-1);background:var(--bg-base);color:var(--text-3);font-size:10px;font-family:inherit;outline:none}
.ni:focus{border-color:var(--warn);color:var(--text-2)}
.ni::placeholder{color:var(--text-6)}
.score-row{padding:0 12px 8px;display:flex;gap:3px;align-items:center}
.score-lbl{font-size:9px;color:var(--text-4);margin-right:4px}
.score-star{background:none;border:none;cursor:pointer;font-size:16px;color:var(--text-6);transition:color .1s;padding:0 1px}
.score-star.lit{color:var(--warn)}

.tip{margin-top:10px;padding:9px 12px;background:var(--success-bg);border:1px solid #1a3a1a;border-radius:6px;font-size:10px;color:#6ee7b7;line-height:1.4}
.bdg{display:inline-block;padding:2px 7px;border-radius:3px;background:#A78BFA22;border:1px solid #A78BFA44;color:var(--accent2);font-size:8px;font-weight:600;margin-right:3px;margin-bottom:2px}
.bdg-g{background:#34D39922;border-color:#34D39944;color:var(--info)}
.bdg-m{background:#FF6B3522;border-color:#FF6B3544;color:var(--mockup)}

/* PROJECT FOLDERS */
.proj-bar{display:flex;gap:5px;overflow-x:auto;margin-bottom:12px;align-items:center}
.proj-btn{padding:5px 12px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-2);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.proj-btn.on{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.proj-add{padding:5px 9px;border-radius:6px;border:1.5px dashed var(--text-6);background:0;color:var(--text-4);font-size:10px;cursor:pointer}
.proj-add:hover{border-color:var(--warn);color:var(--warn)}

/* KEYWORDS */
.kw-cat{margin-bottom:14px}
.kw-hd{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--accent);margin-bottom:6px;text-transform:uppercase}
.kw-g{display:flex;flex-wrap:wrap;gap:4px}
.kw{padding:4px 10px;border-radius:5px;border:1px solid var(--border-1);background:var(--bg-2);color:var(--text-2);font-size:10px;cursor:pointer;transition:all .12s;user-select:none}
.kw:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.kw.on{border-color:var(--success);color:var(--success);background:var(--success-bg)}
.kw-hint{font-size:10px;color:var(--text-5);margin-bottom:12px}
.kw-sel{margin-bottom:12px;padding:10px;background:var(--bg-1);border:1px solid var(--border-1);border-radius:8px}
.kw-sel-lbl{font-size:9px;font-weight:700;color:var(--success);letter-spacing:.5px;margin-bottom:5px}
.kw-sel-list{display:flex;flex-wrap:wrap;gap:4px}
.kw-sel-item{padding:3px 8px;border-radius:4px;background:#22C55E22;border:1px solid #22C55E44;color:var(--success);font-size:9px;display:flex;align-items:center;gap:4px}
.kw-sel-x{cursor:pointer;font-weight:700;opacity:.7}
.kw-sel-x:hover{opacity:1}
.kw-add-btn{margin-top:8px;padding:6px 14px;border-radius:5px;border:none;cursor:pointer;background:var(--success);color:var(--text-1);font-size:11px;font-weight:700}

/* PALETTE */
.pal-cats{display:flex;gap:4px;overflow-x:auto;margin-bottom:12px;flex-wrap:wrap}
.pal-cat{padding:5px 11px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-2);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .15s}
.pal-cat.on{border-color:var(--accent);color:var(--accent);background:var(--accent-bg)}
.pal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.pal-card{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;overflow:visible;cursor:pointer;transition:all .15s;position:relative}
.pal-card:hover{border-color:var(--accent)}
.pal-card.on{border-color:var(--accent);box-shadow:0 0 0 1px #FF4D6D}
.pal-colors{display:flex;height:36px;overflow:hidden;border-radius:8px 8px 0 0}
.pal-colors div{flex:1}
.pal-info{padding:7px 9px}
.pal-name{font-size:10px;font-weight:600;color:var(--text-2)}
.pal-desc{font-size:8px;color:var(--text-4);margin-top:1px}

/* HISTORY */
.h-ctrl{display:flex;gap:6px;margin-bottom:12px;align-items:center;flex-wrap:wrap}
.h-flt{padding:5px 10px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-2);color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer}
.h-flt.on{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.h-src{flex:1;min-width:120px;padding:6px 9px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:11px;outline:none}
.h-src:focus{border-color:var(--accent)}
.hc{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;overflow:hidden;margin-bottom:7px}
.hc-h{padding:8px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-4)}
.hc-m{font-size:9px;color:var(--text-5)}
.hc-tl{font-size:9px;color:var(--accent);font-weight:600;margin-left:5px}
.hc-pr{font-size:9px;color:var(--warn);margin-left:5px}
.hc-st{background:none;border:none;cursor:pointer;font-size:12px;color:var(--text-6);padding:0 3px}
.hc-st.on{color:var(--warn)}
.hc-b{padding:8px 10px;font-family:'Courier New',monospace;font-size:10px;line-height:1.4;color:var(--text-2);max-height:70px;overflow:hidden;word-break:break-word;white-space:pre-wrap}
.hc-n{padding:5px 10px;font-size:9px;color:var(--warn);border-top:1px solid var(--border-4);font-style:italic}
.hc-sc{padding:5px 10px;font-size:9px;color:var(--text-3);border-top:1px solid var(--border-4);display:flex;gap:2px;align-items:center}
.hc-sc .lit{color:var(--warn)}
.hc-f{padding:6px 10px;border-top:1px solid var(--border-4);display:flex;gap:4px}
.hb{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:600;transition:all .15s}
.hb-c{background:var(--border-1);color:var(--text-2)}.hb-c:hover{background:var(--border-2);color:var(--text-1)}.hb-c.ok{background:var(--success);color:var(--text-1)}
.hb-l{background:0;border:1px solid var(--border-2);color:var(--text-3)}.hb-l:hover{border-color:var(--accent);color:var(--accent)}
.hb-d{background:0;color:var(--text-6)}.hb-d:hover{color:var(--accent)}
.h-empty{text-align:center;color:var(--text-6);font-size:12px;padding:30px 14px}

/* PHRASES */
.phl{display:flex;flex-direction:column;gap:7px}
.phc{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;overflow:hidden}
.ph-h{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-bottom:1px solid var(--border-4)}
.ph-l{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
.ph-b{padding:3px 9px;border-radius:4px;border:none;cursor:pointer;background:var(--border-1);color:var(--text-2);font-size:9px;font-weight:600;transition:all .15s}
.ph-b.ok{background:var(--success);color:var(--text-1)}
.ph-t{padding:9px 10px;font-family:'Courier New',monospace;font-size:10px;line-height:1.4;color:var(--text-2);word-break:break-word}

/* DASHBOARD */
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.dash-card{background:linear-gradient(135deg,var(--bg-2),var(--bg-3));border:1px solid var(--border-1);border-radius:10px;padding:14px 10px;text-align:center;position:relative;overflow:hidden}
.dash-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#FF4D6D,#FF6B35);opacity:.6}
.dash-num{font-size:26px;font-weight:800;color:var(--accent);line-height:1}
.dash-lbl{font-size:9px;color:var(--text-5);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.dash-section{margin-bottom:20px}
.dash-sh{font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:8px}
.dash-sh::after{content:'';flex:1;height:1px;background:var(--border-1)}
.quick-row{display:flex;gap:6px;margin-bottom:14px}
.quick-inp{flex:1;padding:10px 12px;border-radius:8px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:13px;outline:none}
.quick-inp:focus{border-color:var(--accent)}
.quick-btn{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:var(--text-1);font-size:12px;font-weight:700}

/* Streak Chart */
.streak-wrap{background:var(--bg-2);border:1px solid var(--border-1);border-radius:10px;padding:14px;margin-bottom:16px}
.streak-bars{display:flex;align-items:flex-end;gap:4px;height:60px;padding-top:4px}
.streak-bar{flex:1;background:linear-gradient(180deg,#FF4D6D,#FF4D6D88);border-radius:3px 3px 0 0;min-height:2px;transition:height .3s;position:relative}
.streak-bar:hover{background:linear-gradient(180deg,#FF6B35,#FF6B3588)}
.streak-bar .sb-tip{display:none;position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#222;color:var(--text-1);padding:2px 6px;border-radius:4px;font-size:8px;white-space:nowrap;pointer-events:none;z-index:10}
.streak-bar:hover .sb-tip{display:block}
.streak-labels{display:flex;gap:4px;margin-top:4px}
.streak-labels span{flex:1;text-align:center;font-size:8px;color:var(--text-6)}
.streak-today{color:var(--accent) !important;font-weight:700}

/* Quick Start Buttons */
.qs-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.qs-card{display:flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;padding:8px 12px;cursor:pointer;transition:all .15s;flex:1;min-width:140px}
.qs-card:hover{border-color:var(--accent);background:var(--accent-bg)}
.qs-card .qs-e{font-size:18px}
.qs-card .qs-t{font-size:10px;font-weight:700;color:var(--text-2)}
.qs-card .qs-d{font-size:8px;color:var(--text-5);margin-top:1px}
.qs-card:hover .qs-t{color:var(--accent)}

/* Pinned Favorites */
.fav-card{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;overflow:hidden;margin-bottom:6px;border-left:3px solid #FBBF24}
.fav-card .fav-top{padding:6px 10px;display:flex;align-items:center;justify-content:space-between}
.fav-card .fav-meta{font-size:8px;color:var(--text-5);display:flex;align-items:center;gap:4px}
.fav-card .fav-meta .fav-star{color:var(--warn);font-size:10px}
.fav-card .fav-meta .fav-tpl{color:var(--accent);font-weight:600}
.fav-card .fav-body{padding:4px 10px 8px;font-family:'Courier New',monospace;font-size:9px;color:var(--text-2);line-height:1.3;max-height:40px;overflow:hidden;word-break:break-word}
.fav-card .fav-acts{padding:4px 10px 6px;display:flex;gap:4px}
.fav-card .fav-btn{padding:3px 8px;border-radius:4px;border:1px solid var(--border-2);background:0;color:var(--text-4);font-size:9px;cursor:pointer;transition:all .15s}
.fav-card .fav-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Project Spotlight */
.proj-spot{background:linear-gradient(135deg,var(--bg-2),var(--accent-bg));border:1px solid var(--border-1);border-radius:10px;padding:14px;margin-bottom:16px;position:relative;overflow:hidden}
.proj-spot::before{content:'';position:absolute;top:0;right:0;width:80px;height:80px;background:radial-gradient(circle,#FF4D6D11,transparent);pointer-events:none}
.proj-spot .ps-name{font-size:13px;font-weight:800;color:var(--accent);margin-bottom:2px}
.proj-spot .ps-meta{font-size:9px;color:var(--text-5);margin-bottom:8px}
.proj-spot .ps-prompts{display:flex;flex-direction:column;gap:4px}
.proj-spot .ps-item{display:flex;align-items:center;justify-content:space-between;background:var(--bg-3);border-radius:5px;padding:5px 8px}
.proj-spot .ps-txt{font-family:'Courier New',monospace;font-size:9px;color:var(--text-3);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;margin-right:8px}
.proj-spot .ps-btn{padding:2px 6px;border-radius:3px;border:1px solid var(--border-2);background:0;color:var(--text-4);font-size:8px;cursor:pointer}
.proj-spot .ps-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Workflow Chain Cards on Dashboard */
.chain-card{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;overflow:hidden;margin-bottom:6px;cursor:pointer;transition:all .15s}
.chain-card:hover{border-color:#FF4D6D44}
.chain-card .ch-head{padding:8px 10px;display:flex;align-items:center;justify-content:space-between}
.chain-card .ch-name{font-size:11px;font-weight:700;color:var(--text-2)}
.chain-card .ch-steps{font-size:9px;color:var(--text-5)}
.chain-card .ch-body{display:none;padding:0 10px 8px}
.chain-card.open .ch-body{display:block}
.chain-card .ch-step{padding:4px 0;font-size:9px;color:var(--text-3);display:flex;gap:6px}
.chain-card .ch-num{color:var(--accent);font-weight:700;min-width:14px}

/* MODAL */
.mo-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:14px}
.mo{background:var(--bg-3);border:1px solid var(--border-2);border-radius:10px;padding:18px;max-width:500px;width:100%;max-height:80vh;overflow-y:auto}
.mo h3{font-size:14px;font-weight:700;margin-bottom:10px}
.mo p{font-size:11px;color:var(--text-3);margin-bottom:10px;line-height:1.4}
.mo textarea,.mo input[type=text]{width:100%;padding:8px;border-radius:5px;border:1px solid var(--border-2);background:var(--bg-1);color:var(--text-2);font-size:11px;font-family:inherit;outline:none;margin-bottom:8px}
.mo textarea{min-height:100px;font-family:'Courier New',monospace;resize:vertical}
.mo-a{display:flex;gap:6px;margin-top:10px}
.mo-p{padding:7px 16px;border-radius:5px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:var(--accent);color:var(--text-1)}
.mo-s{padding:7px 14px;border-radius:5px;border:1px solid var(--border-2);background:0;color:var(--text-3);font-size:11px;cursor:pointer}

/* BULK */
.bulk-ta{width:100%;padding:10px;border-radius:6px;border:1px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:11px;font-family:'Courier New',monospace;min-height:80px;outline:none;resize:vertical;margin-bottom:8px}
.bulk-ta:focus{border-color:var(--accent)}
.bulk-out{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;margin-bottom:6px;overflow:hidden}
.bulk-hdr{padding:7px 10px;border-bottom:1px solid var(--border-4);display:flex;justify-content:space-between;align-items:center}
.bulk-idx{font-size:10px;font-weight:700;color:var(--accent)}
.bulk-body{padding:8px 10px;font-family:'Courier New',monospace;font-size:10px;line-height:1.4;color:var(--text-2);word-break:break-word;white-space:pre-wrap}

/* VARIABLES */
.var-card{background:var(--bg-2);border:1px solid var(--border-1);border-radius:8px;padding:10px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.var-token{font-family:'Courier New',monospace;font-size:11px;color:var(--accent);font-weight:700;flex-shrink:0}
.var-val{font-size:11px;color:var(--text-2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.var-acts{display:flex;gap:3px}

@media(max-width:500px){.hdr{padding:10px}.ctn{padding:10px 8px 40px}.tpl{min-width:85px;padding:6px 9px;font-size:10px}.tab{padding:5px 9px;font-size:10px}}

/* GENERATOR SELECTOR */
.gen-bar{display:flex;gap:5px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.gen-lbl{font-size:10px;color:var(--text-4);font-weight:600}
.gen-sel{padding:5px 10px;border-radius:5px;border:1px solid var(--border-2);background:var(--bg-3);color:var(--text-2);font-size:10px;outline:none;cursor:pointer}
.gen-sel:focus{border-color:var(--accent)}
.neg-box{margin-top:8px;width:100%;padding:8px 10px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:11px;font-family:inherit;outline:none;resize:vertical;min-height:40px}
.neg-box:focus{border-color:var(--accent)}
.neg-lbl{font-size:9px;color:var(--accent);font-weight:600;margin-top:10px;margin-bottom:3px}
.ref-lbl{font-size:9px;color:var(--accent2);font-weight:600;margin-top:10px;margin-bottom:3px}
.ref-inp{width:100%;padding:8px 10px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-1);font-size:11px;font-family:inherit;outline:none}
.ref-inp:focus{border-color:var(--accent2)}
.ref-inp::placeholder{color:var(--text-5)}

/* RECIPES */


/* SECTION CLEAR BUTTONS */
.sec-clr{padding:3px 8px;border-radius:4px;border:1px solid var(--border-2);background:0;color:var(--text-5);font-size:9px;cursor:pointer;transition:all .12s;white-space:nowrap}
.sec-clr:hover{border-color:var(--accent);color:var(--accent)}

/* AI POLISH PANEL */
.polish-wrap{margin-top:10px;border:1.5px solid var(--border-1);border-radius:8px;overflow:hidden}
.polish-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg-2);border-bottom:1px solid var(--border-1)}
.polish-title{font-size:10px;font-weight:700;color:var(--accent2)}
.polish-close{background:0;border:0;color:var(--text-5);cursor:pointer;font-size:12px;padding:2px 6px}
.polish-close:hover{color:var(--accent)}
.polish-body{padding:10px 12px}
.polish-card{background:var(--bg-1);border:1px solid var(--border-1);border-radius:6px;padding:10px;margin-bottom:8px;position:relative}
.polish-card:last-child{margin-bottom:0}
.polish-card-label{font-size:9px;font-weight:700;color:var(--accent2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.polish-card-text{font-size:11px;color:var(--text-2);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.polish-card-acts{display:flex;gap:4px;margin-top:8px}
.polish-card-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border-2);background:0;color:var(--text-3);font-size:9px;font-weight:600;cursor:pointer;transition:all .12s}
.polish-card-btn:hover{border-color:var(--accent);color:var(--accent)}
.polish-card-btn.primary{background:linear-gradient(135deg,#A78BFA,#7C3AED);border-color:transparent;color:#fff}
.polish-card-btn.primary:hover{opacity:.85}
.polish-loading{text-align:center;padding:20px;color:var(--text-5);font-size:11px}
.polish-loading .dot{animation:ai-pulse 1.2s infinite}
.polish-opts{display:flex;gap:6px;flex-wrap:wrap;padding:8px 12px;border-top:1px solid var(--border-1);background:var(--bg-2)}
.polish-opt{padding:5px 12px;border-radius:5px;border:1px solid var(--border-2);background:0;color:var(--text-3);font-size:10px;font-weight:600;cursor:pointer;transition:all .12s}
.polish-opt:hover{border-color:var(--accent2);color:var(--accent2)}
.polish-opt:disabled{opacity:.4;cursor:not-allowed}

/* WORD COUNT */
.wc{padding:4px 12px;font-size:9px;color:var(--text-5);display:flex;gap:12px}
.wc span{display:inline-flex;gap:3px}

/* STYLE SEARCH */
.sty-search{width:100%;padding:6px 9px;border-radius:5px;border:1px solid var(--border-1);background:var(--bg-input);color:var(--text-2);font-size:10px;outline:none;margin-bottom:2px}
.sty-search:focus{border-color:var(--accent2)}
.sty-cat{border-bottom:1px solid var(--border-4)}.sty-cat:last-child{border-bottom:none}
.sty-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;cursor:pointer;user-select:none;transition:background .1s}
.sty-cat-hdr:hover{background:var(--bg-3)}
.sty-cat-lbl{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent2)}
.sty-cat-cnt{font-size:8px;color:var(--text-5);margin-right:6px}
.sty-cat-meta{display:flex;align-items:center;gap:4px}
.sty-cat-arr{font-size:8px;color:var(--text-5);transition:transform .2s}
.sty-cat.open .sty-cat-arr{transform:rotate(180deg)}
.sty-cat-body{display:none}
.sty-cat.open .sty-cat-body{display:block}

/* AI STYLE GENERATOR */
.ai-wrap{padding:8px 12px;border-bottom:1px solid var(--border-3)}
.ai-row{display:flex;gap:6px;align-items:center}
.ai-inp-wrap{position:relative;flex:1}
.ai-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.ai-inp{width:100%;padding:7px 10px 7px 28px;border-radius:6px;border:1.5px solid var(--border-1);background:var(--bg-input);color:var(--text-1);font-size:11px;outline:none;transition:border-color .15s}
.ai-inp:focus{border-color:var(--accent2)}
.ai-inp::placeholder{color:var(--text-5)}
.ai-gen-btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;background:linear-gradient(135deg,#A78BFA,#7C3AED);color:var(--text-1);font-size:10px;font-weight:700;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:4px}
.ai-gen-btn:hover{background:linear-gradient(135deg,#c4b5fd,#8b5cf6)}
.ai-gen-btn:disabled{opacity:.5;cursor:not-allowed}
.ai-gen-btn.loading{animation:ai-pulse 1.2s infinite}
@keyframes ai-pulse{0%,100%{opacity:.6}50%{opacity:1}}
.ai-chips{display:flex;flex-wrap:wrap;gap:4px;padding:4px 0 2px}
.ai-chip{padding:3px 8px;border-radius:4px;border:1px solid var(--border-2);background:var(--bg-3);color:var(--text-3);font-size:9px;cursor:pointer;transition:all .12s}
.ai-chip:hover{border-color:var(--accent2);color:var(--accent2);background:#A78BFA11}
.ai-results{padding:6px 0}
.ai-result{background:var(--bg-input);border:1px solid var(--border-1);border-radius:8px;margin:6px 12px;overflow:hidden;transition:border-color .15s}
.ai-result:hover{border-color:#A78BFA44}
.ai-result-hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 10px}
.ai-result-name{font-size:11px;font-weight:700;color:var(--accent2)}
.ai-result-acts{display:flex;gap:4px}
.ai-result-btn{padding:4px 10px;border-radius:4px;border:none;cursor:pointer;font-size:9px;font-weight:600;transition:all .15s}
.ai-result-add{background:var(--success);color:var(--text-1)}.ai-result-add:hover{background:#16a34a}
.ai-result-add.added{background:var(--border-2);color:var(--text-4);cursor:default}
.ai-result-edit{background:var(--border-1);color:var(--text-2)}.ai-result-edit:hover{background:var(--border-2);color:var(--text-1)}
.ai-result-body{padding:0 10px 10px;font-family:'Courier New',monospace;font-size:10px;line-height:1.5;color:var(--text-3)}
.ai-status{padding:6px 12px;font-size:10px;color:var(--text-5);font-style:italic}
.ai-err{padding:6px 12px;font-size:10px;color:var(--accent)}
.ai-key-hint{padding:4px 12px;font-size:9px;color:var(--text-5)}
.ai-key-hint a{color:var(--accent2);cursor:pointer;text-decoration:underline}
.si-tg.ai{background:#A78BFA22;color:var(--accent2)}

/* MOOD BOARD */
.mb-zone{margin-top:6px;padding:0}
.mb-drop{border:1.5px dashed #333;border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg-input);min-height:48px;position:relative}
.mb-drop:hover,.mb-drop.over{border-color:var(--accent2);background:#A78BFA08}
.mb-drop-txt{font-size:10px;color:var(--text-5);pointer-events:none}
.mb-drop-txt span{color:var(--accent2);font-weight:600}
.mb-drop-sub{font-size:8px;color:var(--text-6);margin-top:2px;pointer-events:none}
.mb-file{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer}
.mb-previews{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mb-thumb{position:relative;width:64px;height:64px;border-radius:6px;overflow:hidden;border:1px solid var(--border-1);flex-shrink:0;background:var(--bg-1)}
.mb-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.mb-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:rgba(0,0,0,.7);border:1px solid #555;color:var(--accent);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .15s}
.mb-thumb-del:hover{background:var(--accent);color:var(--text-1);border-color:var(--accent)}
.mb-count{font-size:8px;color:var(--text-5);margin-top:4px}

/* ONBOARDING */
.onb{background:linear-gradient(135deg,#1a0a10,#141414);border:1px solid #FF4D6D44;border-radius:12px;padding:20px;margin-bottom:16px;text-align:center}
.onb h2{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:6px}
.onb p{font-size:12px;color:var(--text-3);margin-bottom:12px;line-height:1.5}
.onb-steps{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
.onb-step{background:var(--bg-1);border:1px solid var(--border-1);border-radius:8px;padding:10px;flex:1;min-width:120px;max-width:180px}
.onb-step .onb-n{font-size:18px;font-weight:800;color:var(--accent);margin-bottom:4px}
.onb-step .onb-t{font-size:10px;color:var(--text-2);font-weight:600}
.onb-step .onb-d{font-size:9px;color:var(--text-4);margin-top:2px}
.onb-go{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;background:var(--accent);color:var(--text-1);font-size:13px;font-weight:700}

/* HIST TEMPLATE FILTER */
.h-tpl-sel{padding:5px 8px;border-radius:5px;border:1.5px solid var(--border-1);background:var(--bg-1);color:var(--text-2);font-size:10px;outline:none}

/* THEME TOGGLE & ACCENT PICKER */
.theme-toggle{width:36px;height:20px;border-radius:10px;border:1.5px solid var(--border-2);background:var(--bg-3);cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.theme-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text-5);transition:all .2s}
body.light .theme-toggle{border-color:#ddd;background:#e0e0e0}
body.light .theme-toggle::after{left:18px;background:#FBBF24}


/* UNDO/REDO */
.undo-bar{display:flex;gap:3px;margin-left:auto}
.undo-btn{padding:4px 8px;border-radius:4px;border:1px solid var(--border-2);background:0;color:var(--text-5);font-size:10px;cursor:pointer;transition:all .12s}
.undo-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.undo-btn:disabled{opacity:.3;cursor:default}


/* Image Generation */
.img-gen-wrap{margin-top:12px;border:1.5px solid var(--border-1);border-radius:10px;overflow:hidden;background:var(--bg-1)}
@media(max-width:700px){#v-imggen>div>div[style*='grid-template-columns:1fr 1fr']{grid-template-columns:1fr!important}}
.img-gen-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg-2);border-bottom:1px solid var(--border-1)}
.img-gen-title{font-size:11px;font-weight:700;color:var(--accent2);letter-spacing:.5px}
.img-gen-badge{font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff;letter-spacing:.5px}
.img-gen-body{padding:16px}
.img-gen-preview{width:100%;aspect-ratio:1/1;border-radius:8px;border:2px dashed var(--border-2);display:flex;align-items:center;justify-content:center;background:var(--bg-2);overflow:hidden;position:relative}
.img-gen-preview img{width:100%;height:100%;object-fit:contain}
.img-gen-placeholder{text-align:center;color:var(--text-5)}
.img-gen-placeholder .icon{font-size:48px;margin-bottom:8px}
.img-gen-placeholder .text{font-size:11px;line-height:1.6}
.img-gen-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.img-gen-btn{flex:1;padding:10px 16px;border-radius:8px;border:0;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;min-width:120px}
.img-gen-btn.primary{background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff}
.img-gen-btn.primary:hover{opacity:.85;transform:translateY(-1px)}
.img-gen-btn.primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.img-gen-btn.secondary{background:var(--bg-2);border:1px solid var(--border-2);color:var(--text-3)}
.img-gen-btn.secondary:hover{border-color:var(--accent);color:var(--accent)}
.img-gen-opts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.img-gen-opt{padding:5px 12px;border-radius:6px;border:1px solid var(--border-2);background:0;color:var(--text-4);font-size:9px;font-weight:600;cursor:pointer;transition:all .12s}
.img-gen-opt:hover,.img-gen-opt.on{border-color:var(--accent);color:var(--accent)}
.img-gen-loading{text-align:center;padding:40px;color:var(--text-5)}
.img-gen-loading .spinner{width:32px;height:32px;border:3px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.img-gen-error{padding:12px;background:var(--bg-2);border-radius:6px;color:var(--accent2);font-size:11px;text-align:center;margin-top:8px}

/* Tier Badge */
.tier-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.5px}
.tier-badge.free{background:var(--bg-3);color:var(--text-5)}
.tier-badge.pro{background:linear-gradient(135deg,#A78BFA22,#7C3AED22);color:#A78BFA;border:1px solid #A78BFA44}
.pro-tag{font-size:7px;font-weight:700;padding:1px 5px;border-radius:4px;background:linear-gradient(135deg,#A78BFA,#7C3AED);color:#fff;letter-spacing:.5px;vertical-align:middle;margin-left:4px}

/* AI Suggest */

.ai-suggest-chip{padding:4px 10px;border-radius:5px;border:1px solid #A78BFA44;background:#A78BFA11;color:#A78BFA;font-size:9px;cursor:pointer;transition:all .12s;animation:fadeIn .3s}
.ai-suggest-chip:hover{background:#A78BFA22;border-color:#A78BFA}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.ai-suggest-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;min-height:0}
</style>

let aiGenerating=false;
let aiResults=[];
let moodImages=[];// Array of {data: base64DataUrl, name: filename}
const MAX_MOOD_IMAGES=6;
const AI_QUICK=['dark moody cinematic','retro 70s sunset','cute kawaii pastel','cyberpunk neon rain','luxury gold marble','grunge punk raw','watercolor dreamy soft','streetwear hype bold','nature botanical organic','psychedelic acid trippy'];









async function generateAiStyles(vibeText){
  if(!requirePro('AI Style Generation'))return;
  if((!vibeText||vibeText.trim().length<2)&&!moodImages.length){toast('Describe a vibe or upload mood board images','warn');return;}
  if(aiGenerating)return;
  
  aiGenerating=true;
  aiResults=[];
  renderAiPanel();

  const tpl=TEMPLATES[currentTemplate];
  const tplId=tpl.id;
  
  // Get existing style names for this template so AI doesn't duplicate
  const existingNames=(TEMPLATE_STYLES[tplId]||[]).flatMap(c=>c.styles.map(s=>s.name));
  
  const hasImages=moodImages.length>0;
  const imageNote=hasImages?`\n\nThe user has also uploaded ${moodImages.length} mood board image(s). Analyze the visual style, color palette, textures, mood, and techniques visible in these images. Use them as primary style references — the generated styles should capture the aesthetic DNA of these images.`:'';
  
  const systemPrompt=`You are an expert AI image prompt engineer specializing in style instructions for AI image generators (Midjourney, DALL·E, Stable Diffusion, Flux, Leonardo, Firefly, Ideogram).

The user is building a prompt for a "${tpl.n}" template (${tpl.d}).

Generate exactly 3 unique style presets based on the user's vibe description${hasImages?' and their mood board images':''}. Each style should be a detailed instruction paragraph (2-4 sentences) that an AI image generator can use to set the visual style, mood, and technique.

Rules:
- Each style must be distinct from the others
- Write style instructions, NOT full prompts — no subject matter, just visual style/mood/technique
- Be specific with technique terms, color references, texture descriptions, and cultural/artistic references
- Match the template context (e.g. for clothing, think print-ready garment graphics; for tattoo, think skin-appropriate art)
- Do NOT duplicate these existing styles: ${existingNames.slice(0,15).join(', ')}${imageNote}

Respond with ONLY valid JSON, no markdown, no backticks. Format:
[{"name":"Short Style Name","content":"Detailed style instruction paragraph..."},{"name":"...","content":"..."},{"name":"...","content":"..."}]`;

  // Build user message content array (text + optional images)
  const userContent=[];
  
  // Add images first so GPT sees them before the text instruction
  if(hasImages){
    moodImages.forEach(img=>{
      const base64=img.data.split(',')[1];
      const mimeMatch=img.data.match(/data:(image\/\w+);/);
      const mime=mimeMatch?mimeMatch[1]:'image/jpeg';
      userContent.push({type:'image_url',image_url:{url:`data:${mime};base64,${base64}`,detail:'low'}});
    });
  }
  
  const vibeStr=vibeText&&vibeText.trim()?vibeText.trim():'(no text — use the mood board images above as the vibe reference)';
  userContent.push({type:'text',text:'Generate styles for this vibe: '+vibeStr});

  try{
    const resp=await fetch(API_CONFIG.baseUrl + '/ai/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[
          {role:'system',content:systemPrompt},
          {role:'user',content:userContent}
        ],
        temperature:0.9,
        max_tokens:800
      })
    });
    
    if(!resp.ok){
      const errData=await resp.json().catch(()=>({}));
      const errMsg=errData.error?.message||('API error '+resp.status);
      throw new Error(errMsg);
    }
    
    const data=await resp.json();
    let text=data.choices[0].message.content.trim();
    // Strip markdown fences if present
    text=text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    
    const parsed=JSON.parse(text);
    if(!Array.isArray(parsed)||!parsed.length)throw new Error('Invalid response format');
    
    aiResults=parsed.map(r=>({
      name:r.name||'AI Style',
      content:r.content||'',
      added:false
    }));
    
  }catch(e){
    aiResults=[];
    aiGenerating=false;
    renderAiPanel(e.message);
    return;
  }
  
  aiGenerating=false;
  renderAiPanel();
}

function addAiStyle(idx){
  if(idx<0||idx>=aiResults.length||aiResults[idx].added)return;
  const r=aiResults[idx];
  styles.push({name:r.name,content:r.content,active:true,preset:false,ai:true});
  r.added=true;
  saveLocal();
  renderStyleList();
  updatePrompt();
  renderAiPanel();
  toast('Style "'+r.name+'" added','success');
}

function addAllAiStyles(){
  let count=0;
  aiResults.forEach(r=>{
    if(!r.added){
      styles.push({name:r.name,content:r.content,active:true,preset:false,ai:true});
      r.added=true;
      count++;
    }
  });
  if(count){saveLocal();renderStyleList();updatePrompt();renderAiPanel();toast(count+' styles added','success');}
}

// ========== UI: MOOD BOARD ==========
function handleMoodFiles(files){
  if(!files||!files.length)return;
  const remaining=MAX_MOOD_IMAGES-moodImages.length;
  if(remaining<=0){toast('Max '+MAX_MOOD_IMAGES+' images','warn');return;}
  const toProcess=Array.from(files).slice(0,remaining);
  let loaded=0;
  toProcess.forEach(file=>{
    if(!file.type.startsWith('image/')){loaded++;return;}
    if(file.size>10*1024*1024){toast(file.name+' too large (10MB max)','warn');loaded++;return;}
    const reader=new FileReader();
    reader.onload=function(e){
      // Resize to max 512px for API efficiency
      const img=new Image();
      img.onload=function(){
        const max=512;
        let w=img.width,h=img.height;
        if(w>max||h>max){
          if(w>h){h=Math.round(h*(max/w));w=max;}
          else{w=Math.round(w*(max/h));h=max;}
        }
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        const dataUrl=canvas.toDataURL('image/jpeg',0.8);
        moodImages.push({data:dataUrl,name:file.name});
        loaded++;
        if(loaded>=toProcess.length)renderMoodBoard();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function removeMoodImage(idx){
  moodImages.splice(idx,1);
  renderMoodBoard();
}

function clearMoodBoard(){
  moodImages=[];
  renderMoodBoard();
}

function renderMoodBoard(){
  const wrap=document.getElementById('mb-previews');if(!wrap)return;
  const countEl=document.getElementById('mb-count');
  const btn=document.getElementById('ai-gen-btn');
  if(!moodImages.length){
    wrap.innerHTML='';
    if(countEl)countEl.textContent='';
    if(btn&&!aiGenerating)btn.innerHTML='✨ Generate';
    return;
  }
  let html='';
  moodImages.forEach((img,i)=>{
    html+=`<div class="mb-thumb"><img src="${img.data}" alt="${escapeHtml(img.name)}" title="${escapeHtml(img.name)}"><button class="mb-thumb-del" onclick="removeMoodImage(${i})" title="Remove">✕</button></div>`;
  });
  wrap.innerHTML=html;
  if(countEl)countEl.textContent=moodImages.length+'/'+MAX_MOOD_IMAGES+' images'+(moodImages.length>=MAX_MOOD_IMAGES?' (max)':'');
  if(btn&&!aiGenerating)btn.innerHTML='✨ Generate ('+moodImages.length+' 📷)';
}

function setupMoodDrop(el){
  if(!el)return;
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('over');});
  el.addEventListener('dragleave',()=>el.classList.remove('over'));
  el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('over');handleMoodFiles(e.dataTransfer.files);});
}

function renderAiPanel(errMsg){
  const wrap=document.getElementById('ai-results');if(!wrap)return;
  
  if(aiGenerating){
    wrap.innerHTML='<div class="ai-status">✨ Generating styles...</div>';
    const btn=document.getElementById('ai-gen-btn');
    if(btn){btn.disabled=true;btn.classList.add('loading');btn.innerHTML='⏳ Generating...';}
    return;
  }
  
  const btn=document.getElementById('ai-gen-btn');
  if(btn){btn.disabled=false;btn.classList.remove('loading');btn.innerHTML=moodImages.length?'✨ Generate ('+moodImages.length+' 📷)':'✨ Generate';}
  
  if(errMsg){
    wrap.innerHTML='<div class="ai-err">⚠ '+escapeHtml(errMsg)+'</div>';
    return;
  }
  
  if(!aiResults.length){wrap.innerHTML='';return;}
  
  let html='';
  aiResults.forEach((r,i)=>{
    html+=`<div class="ai-result">
      <div class="ai-result-hdr">
        <span class="ai-result-name">✨ ${escapeHtml(r.name)}</span>
        <div class="ai-result-acts">
          <button class="ai-result-btn ai-result-edit" onclick="editAiResult(${i})">✎ Edit</button>
          <button class="ai-result-btn ai-result-add${r.added?' added':''}" onclick="addAiStyle(${i})"${r.added?' disabled':''}>${r.added?'✓ Added':'+ Add Style'}</button>
        </div>
      </div>
      <div class="ai-result-body">${escapeHtml(r.content)}</div>
    </div>`;
  });
  
  const unadded=aiResults.filter(r=>!r.added).length;
  if(unadded>1){
    html+=`<div style="padding:6px 12px;display:flex;justify-content:flex-end"><button class="ai-result-btn ai-result-add" onclick="addAllAiStyles()" style="padding:5px 14px">+ Add All (${unadded})</button></div>`;
  }
  
  wrap.innerHTML=html;
}

// Undo/Redo
let undoStack=[],redoStack=[];
let undoTimer=null;
function pushUndo(){
  const snap=JSON.stringify(variations[currentVariation].values);
  if(undoStack.length&&undoStack[undoStack.length-1]===snap)return;// No change
  undoStack.push(snap);
  redoStack=[];// Clear redo on new action
  if(undoStack.length>50)undoStack.shift();// Cap at 50
  updateUndoBtns();
}
function doUndo(){
  if(!undoStack.length)return;
  redoStack.push(JSON.stringify(variations[currentVariation].values));
  variations[currentVariation].values=JSON.parse(undoStack.pop());
  renderBuilder();
  updateUndoBtns();
}
function doRedo(){
  if(!redoStack.length)return;
  undoStack.push(JSON.stringify(variations[currentVariation].values));
  variations[currentVariation].values=JSON.parse(redoStack.pop());
  renderBuilder();
  updateUndoBtns();
}
function scheduleUndo(){
  clearTimeout(undoTimer);
  undoTimer=setTimeout(pushUndo,600);// Debounce 600ms
}
function resetUndo(){undoStack=[];redoStack=[];updateUndoBtns();}
function updateUndoBtns(){
  const ub=document.getElementById('undo-btn'),rb=document.getElementById('redo-btn');
  if(ub)ub.disabled=!undoStack.length;
  if(rb)rb.disabled=!redoStack.length;
}

function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

// ========== UI: TOAST SYSTEM ==========
function toast(msg,type='info',dur=2500){
  let tc=document.getElementById('toast-container');
  if(!tc){tc=document.createElement('div');tc.id='toast-container';tc.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:6px;align-items:center;pointer-events:none';document.body.appendChild(tc);}
  const t=document.createElement('div');
  const colors={info:'#333',success:'#22C55E',warn:'#FBBF24',error:'#FF4D6D'};
  t.style.cssText=`padding:8px 18px;border-radius:8px;background:${colors[type]||colors.info};color:#fff;font-size:12px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.4);opacity:0;transition:opacity .2s;pointer-events:auto`;
  t.textContent=msg;tc.appendChild(t);
  requestAnimationFrame(()=>t.style.opacity='1');
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},dur);
}

// ========== ACTIONS: LOAD IN BUILDER ==========
function loadInBuilder(idx){
  const h=history[idx];if(!h)return;
  // Try to find the original template by name
  let tplIdx=TEMPLATES.findIndex(t=>t.n===h.template);
  if(tplIdx<0)tplIdx=4; // fallback to freestyle
  currentTemplate=tplIdx;
  // Restore field values if saved, otherwise put prompt into first field
  const tpl=TEMPLATES[currentTemplate];
  if(h.fieldValues){
    variations=[{id:1,values:{...h.fieldValues}}];
  } else {
    const firstKey=tpl.f[0]?tpl.f[0].k:'subject';
    const vals={};vals[firstKey]=h.prompt;
    variations=[{id:1,values:vals}];
  }
  currentVariation=0;nextVariationId=2;
  promptNote=h.note||'';promptStarred=h.starred||false;promptScore=h.score||0;
  // Restore generator (Fix #4)
  if(h.generator)currentGenerator=h.generator;
  negativePrompt='';referenceImageUrl='';referencePhoto=null;
  lastSavedHistId=h.id; // Link iteration chain
  switchTab(1);
}

  let ts=localStorage.getItem('spb_tplsty');
  if(ts){const tss=JSON.parse(ts);Object.keys(tss).forEach(k=>{if(TEMPLATE_STYLES[k]&&tss[k]&&Array.isArray(tss[k][0])){tss[k].forEach((catActive,ci)=>{if(TEMPLATE_STYLES[k][ci])catActive.forEach((a,si)=>{if(TEMPLATE_STYLES[k][ci].styles[si])TEMPLATE_STYLES[k][ci].styles[si].active=a;});});}});}
  // Restore user phrases (Bug #8)
  let up=localStorage.getItem('spb_user_phrases');if(up)userPhrases=JSON.parse(up);

  let cg=localStorage.getItem('spb_gen');if(cg)currentGenerator=cg;

  let mgd=localStorage.getItem('spb_media');if(mgd)mediaGallery=JSON.parse(mgd);
}catch(e){styles=JSON.parse(JSON.stringify(DEFAULT_STYLES));}
}

  localStorage.setItem('spb_styles',JSON.stringify(styles));
  localStorage.setItem('spb_hist',JSON.stringify(history));
  localStorage.setItem('spb_proj',JSON.stringify(projects));

function applyTheme(){
  if(currentTheme==='light')document.body.classList.add('light');
  else document.body.classList.remove('light');
}
function applyAccent(){
  const r=document.documentElement.style;
  r.setProperty('--accent',currentAccent);
  // Compute accent-bg (very transparent version)
  const hex=currentAccent.replace('#','');
  const rb=parseInt(hex.substring(0,2),16),gb=parseInt(hex.substring(2,4),16),bb=parseInt(hex.substring(4,6),16);
  if(currentTheme==='light'){
    r.setProperty('--accent-bg',`rgba(${rb},${gb},${bb},0.08)`);
  }else{
    r.setProperty('--accent-bg',`rgba(${rb},${gb},${bb},0.12)`);
  }
  r.setProperty('--accent-hover',currentAccent+'cc');
}
function toggleTheme(){
  currentTheme=currentTheme==='dark'?'light':'dark';
  localStorage.setItem('spb_theme',currentTheme);
  applyTheme();applyAccent();
}
function setAccent(color){
  currentAccent=color;
  localStorage.setItem('spb_accent',color);
  applyAccent();
}

function saveRecipe(name, description){
  if(!name||!name.trim()){toast('Recipe name required','warn');return;}
  const cats=TEMPLATE_STYLES[TEMPLATES[currentTemplate].id]||[];
  const activeStyles=cats.map(cat=>cat.styles.map(s=>s.active));
  const recipe={
    id:generateId(),name:name,description:description||'',
    tplId:TEMPLATES[currentTemplate].id,tplName:TEMPLATES[currentTemplate].n,tplEmoji:TEMPLATES[currentTemplate].e,
    fieldValues:{...variations[currentVariation].values},activeStyles,
    customStyles:styles.filter(s=>s.active).map(s=>({name:s.name,content:s.content,ai:s.ai||false})),
    selectedKeywords:[...selectedKeywords],selectedPalettes:[...selectedPalettes],customPalettes,
    generator:currentGenerator,negativePrompt,referenceImageUrl,referencePhoto,
    garment:typeof garment!=='undefined'?garment:null,mockup:typeof mockup!=='undefined'?mockup:false,
    mockupItem:typeof mockupItem!=='undefined'?mockupItem:'',mockupColor:typeof mockupColor!=='undefined'?mockupColor:'black',
    mockupDisplay:typeof mockupDisplay!=='undefined'?mockupDisplay:'flat lay',time:new Date().toISOString()
  };
  recipes.unshift(recipe);
  try{localStorage.setItem('spb_recipes',JSON.stringify(recipes));}catch(e){}
  toast('Recipe "'+name+'" saved!','success');
}

function loadRecipe(idx){
  const r=recipes[idx];if(!r)return;
  // Find template
  const tplIdx=TEMPLATES.findIndex(t=>t.id===r.tplId);
  if(tplIdx<0){toast('Template "'+r.tplName+'" not found','warn');return;}
  currentTemplate=tplIdx;
  
  // Restore fields
  variations=[{id:1,values:{...r.fieldValues}}];currentVariation=0;nextVariationId=2;
  
  // Restore styles
  const cats=TEMPLATE_STYLES[TEMPLATES[currentTemplate].id]||[];
  cats.forEach(cat=>cat.styles.forEach(s=>s.active=false));
  if(r.activeStyles){
    r.activeStyles.forEach((catActive,ci)=>{
      if(cats[ci])catActive.forEach((a,si)=>{
        if(cats[ci].styles[si])cats[ci].styles[si].active=a;
      });
    });
  }
  
  // Restore custom styles from recipe
  if(r.customStyles){
    r.customStyles.forEach(rs=>{
      const existing=styles.find(s=>s.name===rs.name);
      if(existing){existing.active=true;}
      else{styles.push({name:rs.name,content:rs.content,active:true,preset:false,ai:rs.ai||false});}
    });
  }
  
  // Restore other state
  selectedKeywords=r.selectedKeywords||[];
  selectedPalettes=r.selectedPalettes||r.selectedPalette?[r.selectedPalette]:[];
  currentGenerator=r.generator||'raw';
  negativePrompt=r.negativePrompt||'';
  referenceImageUrl=r.referenceImageUrl||'';
  referencePhoto=r.referencePhoto||null;
  garment=r.garment||null;
  mockup=r.mockup||false;
  mockupItem=r.mockupItem||'t-shirt';
  mockupColor=r.mockupColor||'black';
  mockupDisplay=r.mockupDisplay||'flat lay';
  
  promptNote='';promptStarred=false;promptScore=0;
  saveLocal();renderBuilder();
  toast('Recipe "'+r.name+'" loaded!','success');
}

  const isCollapsed=el.classList.toggle('collapsed');
  secState[secId]=!isCollapsed;
  try{localStorage.setItem('spb_sections',JSON.stringify(secState));}catch(e){}
  // Toggle next sibling visibility
  const next=el.nextElementSibling;
  if(next&&next.classList.contains('sec-body')){
    next.style.display=isCollapsed?'none':'';
  }
}

function init(skipGd){

function updatePrompt(){
  const tpl=TEMPLATES[currentTemplate],vals=variations[currentVariation].values,fp=tpl.b(vals);
  const hasF=Object.values(vals).some(v=>v&&v.trim());
  const tplPresets=getTplPresets().filter(s=>s.active);
  const actSty=[...tplPresets,...styles.filter(s=>s.active)],styTxt=actSty.map(s=>s.content).join('\n\n');
  const gt=garTxt(),mt=mockTxt();
  const kwTxt=selectedKeywords.length?'Keywords: '+selectedKeywords.join(', ')+'.':'';
  const palObjs=selectedPalettes.map(n=>getAllPalettes().find(p=>p.n===n)).filter(Boolean);
  const palTxt=palObjs.length?'Color palette: '+palObjs.map(p=>p.c.join(', ')+' ('+p.t+')').join(' + '):'';

  // Get negative prompt from global state
  let negStr=negativePrompt;

  // Build parts array for generator formatting
  let promptParts=[];
  if(styTxt)promptParts.push(styTxt);
  if(gt)promptParts.push(gt);
  if(mt)promptParts.push(mt);
  promptParts.push(fp);
  if(palTxt)promptParts.push(palTxt);
  if(kwTxt)promptParts.push(kwTxt);
  
  // Image reference URL
  const refUrl=referenceImageUrl;
  if(refUrl){
    if(currentGenerator==='midjourney')promptParts.push('--sref '+refUrl);
    else promptParts.push('Style reference: '+refUrl);
  }
  // Reference photo note (photo data sent separately to API, text note in prompt)
  if(referencePhoto){
    if(!refUrl) promptParts.push('Use the attached reference image for style and composition guidance');
  }

  // Apply generator format
  const gen=GENERATORS.find(g=>g.id===currentGenerator)||GENERATORS[GENERATORS.length-1];
  let combined='';
  if(gen.id==='raw'){
    // Raw mode: just join with newlines
    combined=promptParts.join('\n\n');
  } else {
    // Strip --no from fp if generator handles negatives differently
    let cleanParts=promptParts.map(p=>p.replace(/,\s*--no\s+.*$/,''));
    // Extract --no content from fp for generators that handle it
    const noMatch=fp.match(/--no\s+(.+)$/);
    let avoidStr=noMatch?noMatch[1]:'';
    if(negStr)avoidStr=avoidStr?(avoidStr+', '+negStr):negStr;
    combined=gen.format(cleanParts,avoidStr);
  }

  // Apply variables
  vars.forEach(v=>{combined=combined.replaceAll('{'+v.token+'}',v.value);});

  const bg=document.getElementById('badges');
  if(bg){let h='';const genObj=GENERATORS.find(g=>g.id===currentGenerator);if(genObj&&genObj.id!=='raw')h+=`<span class="bdg bdg-m">🎯 ${genObj.name}</span>`;actSty.forEach(s=>h+=`<span class="bdg">${escapeHtml(s.name)}</span>`);if(garment&&(TEMPLATES[currentTemplate].id==='clothing'||TEMPLATES[currentTemplate].id==='collection'))h+=`<span class="bdg bdg-g">${garment==='dark'?'🖤 Dark':'🤍 Light'}</span>`;if(mockup)h+=`<span class="bdg bdg-m">📷 Mockup: ${escapeHtml(mockupItem)}</span>`;if(selectedKeywords.length)h+=`<span class="bdg">${selectedKeywords.length} keywords</span>`;if(selectedPalettes.length)h+=`<span class="bdg">🎨 ${selectedPalettes.length} palette${selectedPalettes.length>1?'s':''}</span>`;if(referencePhoto)h+=`<span class="bdg" style="color:#E879F9">📎 Ref Photo</span>`;bg.innerHTML=h;}

  const out=document.getElementById('p-out');if(!out)return;
  const has=hasF||actSty.length||garment||mockup||selectedKeywords.length||selectedPalettes.length||refUrl||referencePhoto;
  
  if(gen.id==='raw'&&has&&(actSty.length||garment||mockup||selectedPalettes.length||referencePhoto)){
    // Raw mode: show color-coded sections
    let html='';
    if(styTxt)html+=`<span class="p-sy">${escapeHtml(styTxt)}</span>\n\n`;
    if(gt)html+=`<span class="p-gr">${escapeHtml(gt)}</span>\n\n`;
    if(mt)html+=`<span class="p-mk">${escapeHtml(mt)}</span>\n\n`;
    html+=`<span class="p-fl">${escapeHtml(fp)}</span>`;
    if(palTxt)html+=`\n\n<span class="p-gr">${escapeHtml(palTxt)}</span>`;
    if(kwTxt)html+=`\n\n<span class="p-sy">${escapeHtml(kwTxt)}</span>`;
    if(refUrl)html+=`\n\n<span class="p-mk">${escapeHtml(currentGenerator==='midjourney'?'--sref '+refUrl:'Style reference: '+refUrl)}</span>`;
    if(referencePhoto&&!refUrl)html+=`\n\n<span class="p-mk">📎 Use the attached reference image for style and composition guidance</span>`;
    out.innerHTML=html;
  }else{
    // Generator mode or minimal: show the actual formatted output
    out.textContent=combined;
  }
  
  out.className='p-t'+(has?' has':'');
  out.dataset.full=combined;
  // Store raw prompt (without styles) for Copy Raw
  let rawParts=[];if(gt)rawParts.push(gt);if(mt)rawParts.push(mt);rawParts.push(fp);if(palTxt)rawParts.push(palTxt);if(kwTxt)rawParts.push(kwTxt);
  if(refUrl)rawParts.push(currentGenerator==='midjourney'?'--sref '+refUrl:'Style reference: '+refUrl);
  if(referencePhoto&&!refUrl)rawParts.push('Use the attached reference image for style and composition guidance');
  out.dataset.raw=rawParts.join('\n\n');

  const cl=document.getElementById('cl-b');if(cl)cl.style.display=hasF?'block':'none';
  // Word/char count
  const wcW=document.getElementById('wc-w'),wcC=document.getElementById('wc-c');
  if(wcW&&wcC){const txt=combined.trim();const wc=txt?txt.split(/\s+/).length:0;const cc=txt.length;wcW.textContent=wc;wcC.textContent=cc;
    // Show warning if over generator's max length
    const wcBar=document.getElementById('wc-bar');
    if(wcBar&&gen.maxLen&&cc>gen.maxLen){wcBar.style.color='#FF4D6D';wcBar.title=gen.name+' works best under '+gen.maxLen+' chars';}
    else if(wcBar){wcBar.style.color='';wcBar.title='';}
  }
}

let polishResults=[];
let polishLoading=false;

async function polishPrompt(){
  if(!requirePro('AI Prompt Polish'))return;
  const text=(document.getElementById('p-out')?.dataset?.full||'').trim();
  if(!text||text.includes('[SUBJECT]')){toast('Fill in some fields first','warn');return;}

async function callPolishAPI(promptText,mode,count){
  if(polishLoading)return;
  polishLoading=true;
  polishResults=[];
  renderPolishPanel();

  const tpl=TEMPLATES[currentTemplate];
  const gen=GENERATORS.find(g=>g.id===currentGenerator)||GENERATORS[GENERATORS.length-1];

  let sysPrompt='';
  if(mode==='polish'){
    sysPrompt=`You are an expert AI image prompt engineer. The user has built a prompt for "${tpl.n}" (${tpl.d}) targeting ${gen.name}.

Take their prompt and create ONE polished, enhanced version. Make it:
- More specific and evocative with precise visual language
- Better structured for ${gen.name}'s strengths
- Enhanced with professional techniques (lighting, composition, texture details)
- Tighter — remove redundancy, merge overlapping instructions
- Keep the same creative intent, subject, and style direction

Respond with ONLY valid JSON, no markdown, no backticks:
{"result":"The polished prompt text here"}`;
  } else {
    sysPrompt=`You are an expert AI image prompt engineer. The user has built a prompt for "${tpl.n}" (${tpl.d}) targeting ${gen.name}.

Generate exactly ${count} distinct VARIATIONS of their prompt. Each should:
- Keep the same subject/concept but explore a different creative angle
- Vary the style, mood, technique, lighting, or composition
- Be a complete, ready-to-use prompt (not just a modification note)
- Be specific and evocative with precise visual language
- Be optimized for ${gen.name}

Make each variation genuinely different — not just synonym swaps. Think: different artistic movements, different emotional tones, different camera angles or rendering techniques.

Respond with ONLY valid JSON, no markdown, no backticks:
[{"label":"Short 2-3 word label","result":"Full prompt variation text"},{"label":"...","result":"..."}]`;
  }

  try{
    const resp=await fetch(API_CONFIG.baseUrl + '/ai/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'gpt-4o-mini',
        messages:[
          {role:'system',content:sysPrompt},
          {role:'user',content:'Here is my prompt to '+(mode==='polish'?'polish':'create variations of')+':\n\n'+promptText}
        ],
        max_tokens:mode==='polish'?600:1200,
        temperature:mode==='polish'?0.7:0.95
      })
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message||'API error');}
    let raw=data.choices[0].message.content.trim();
    raw=raw.replace(/^```json\s*/,'').replace(/```$/,'').trim();
    const parsed=JSON.parse(raw);
    
    if(mode==='polish'){
      polishResults=[{label:'Polished',result:parsed.result}];
    } else {
      polishResults=parsed;
    }
  }catch(e){
    polishResults=[{label:'Error',result:'Failed: '+e.message}];
  }
  polishLoading=false;
  renderPolishPanel();
}

function renderPolishPanel(){
  const wrap=document.getElementById('polish-panel');
  if(!wrap)return;
  
  if(!polishLoading&&!polishResults.length){wrap.innerHTML='';return;}
  
  if(polishLoading){
    wrap.innerHTML='<div class="polish-wrap"><div class="polish-header"><span class="polish-title">✨ AI Processing...</span></div><div class="polish-loading"><span class="dot">Generating</span></div></div>';
    return;
  }
  
  let html='<div class="polish-wrap"><div class="polish-header"><span class="polish-title">✨ AI Results ('+polishResults.length+')</span><button class="polish-close" onclick="polishResults=[];renderPolishPanel()">✕</button></div><div class="polish-body">';
  
  polishResults.forEach((r,i)=>{
    html+=`<div class="polish-card">
      <div class="polish-card-label">${escapeHtml(r.label||'Result '+(i+1))}</div>
      <div class="polish-card-text">${escapeHtml(r.result)}</div>
      <div class="polish-card-acts">
        <button class="polish-card-btn primary" onclick="clipCopy(polishResults[${i}].result,this)">📋 Copy</button>
        <button class="polish-card-btn" onclick="replacePromptWith(${i})">↩ Use This</button>
        <button class="polish-card-btn" onclick="savePolishedToHistory(${i})">💾 Save</button>
      </div>
    </div>`;
  });
  
  html+='</div><div class="polish-opts">';
  html+='<button class="polish-opt" onclick="polishPrompt()" '+(polishLoading?'disabled':'')+'>✨ Re-polish</button>';
  html+='<button class="polish-opt" onclick="generateVariations(3)" '+(polishLoading?'disabled':'')+'>🔀 3 Variations</button>';
  html+='<button class="polish-opt" onclick="generateVariations(5)" '+(polishLoading?'disabled':'')+'>🔀 5 Variations</button>';
  html+='</div></div>';
  
  wrap.innerHTML=html;
}

function replacePromptWith(idx){
  const r=polishResults[idx];if(!r)return;
  // Parse the polished prompt back into the subject field as a starting point
  const tpl=TEMPLATES[currentTemplate];
  // Put the whole polished prompt into the first field
  const firstKey=tpl.f[0]?tpl.f[0].k:'subject';
  // Clear other fields and put polished text in subject
  variations[currentVariation].values={};
  variations[currentVariation].values[firstKey]=r.result;
  // Switch to freestyle if not already to avoid template formatting issues
  if(tpl.id!=='freestyle'){
    const freeIdx=TEMPLATES.findIndex(t=>t.id==='freestyle');
    if(freeIdx>=0){currentTemplate=freeIdx;variations=[{id:1,values:{subject:r.result}}];currentVariation=0;}
  }
  polishResults=[];
  renderBuilder();
  toast('Prompt replaced — switched to Freestyle','success');
}

  toast('Saved to history!','success');
}

function remixPrompt(){
  // Shuffle styles and keywords while keeping all field values (subject, mood, etc.)
  const cats=TEMPLATE_STYLES[TEMPLATES[currentTemplate].id]||[];
  const allPresets=cats.flatMap(c=>c.styles);
  
  // Deactivate all template presets, then randomly activate 1-3
  allPresets.forEach(s=>s.active=false);
  if(allPresets.length){
    const count=Math.min(allPresets.length,1+Math.floor(Math.random()*3));
    const indices=[];
    while(indices.length<count){
      const r=Math.floor(Math.random()*allPresets.length);
      if(!indices.includes(r))indices.push(r);
    }
    indices.forEach(i=>allPresets[i].active=true);
  }
  
  // Also shuffle user custom styles
  styles.forEach(s=>s.active=Math.random()>0.7);
  
  // Randomly pick keywords (0-5) from KEYWORDS object
  selectedKeywords=[];
  const allKw=Object.values(KEYWORDS).flat();
  if(allKw.length){
    const kwCount=Math.floor(Math.random()*6);
    const kwPicked=new Set();
    for(let i=0;i<kwCount&&kwPicked.size<allKw.length;i++){
      let r=Math.floor(Math.random()*allKw.length);
      if(!kwPicked.has(r)){kwPicked.add(r);selectedKeywords.push(allKw[r]);}
    }
  }
  
  // Randomly pick a palette (or none) from all palettes including custom
  const _ap=getAllPalettes();
  if(_ap.length){
    if(Math.random()>0.3){
      selectedPalettes=[_ap[Math.floor(Math.random()*_ap.length)].n];
    }else{selectedPalettes=[];}
  }
  
  // Randomly swap generator format for variety
  const genOpts = GENERATORS.filter(g => g.id !== 'raw');
  if (genOpts.length && Math.random() > 0.5) {
    currentGenerator = genOpts[Math.floor(Math.random() * genOpts.length)].id;
  }
  
  saveLocal();renderBuilder();
  const activeStyCount = allPresets.filter(s=>s.active).length + styles.filter(s=>s.active).length;
  toast('🔀 Remixed! ' + activeStyCount + ' styles, ' + selectedKeywords.length + ' keywords' + (selectedPalettes.length ? ', 1 palette' : '') + ' shuffled — subject kept', 'success');
}

// Analyzes filled fields and suggests content for empty fields based on the vibe.
let aiSuggestLoading = false;

async function aiSuggestFields() {
  if (!requirePro('AI Suggest')) return;
  if (aiSuggestLoading) return;
  
  const tpl = TEMPLATES[currentTemplate];
  const vals = variations[currentVariation].values;
  
  // Gather what the user has filled in
  const filled = {};
  const empty = [];
  tpl.f.forEach(f => {
    if (vals[f.k] && vals[f.k].trim()) {
      filled[f.l] = vals[f.k];
    } else {
      empty.push({key: f.k, label: f.l, question: f.q, placeholder: f.p});
    }
  });
  
  if (Object.keys(filled).length === 0) {
    toast('Fill in at least one field first so AI can read the vibe', 'warn');
    return;
  }
  if (empty.length === 0) {
    toast('All fields are filled!', 'success');
    return;
  }
  
  // Get active styles for context
  const tplPresets = getTplPresets().filter(s => s.active);
  const actSty = [...tplPresets, ...styles.filter(s => s.active)];
  const styleContext = actSty.length ? 'Active styles: ' + actSty.map(s => s.name).join(', ') : '';
  const palContext = selectedPalettes.length ? 'Selected palettes: ' + selectedPalettes.join(', ') : '';
  const kwContext = selectedKeywords.length ? 'Active keywords: ' + selectedKeywords.join(', ') : '';
  
  aiSuggestLoading = true;
  const btn = document.getElementById('ai-suggest-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '⏳ Thinking...'; }
  
  const filledDesc = Object.entries(filled).map(([k, v]) => k + ': ' + v).join('\n');
  const emptyDesc = empty.map(e => e.label + ' (' + e.question + ')').join(', ');
  
  const sysPrompt = `You are an expert AI image prompt engineer. The user is building a "${tpl.n}" prompt (${tpl.d}).

They have filled in some fields and left others empty. Analyze the VIBE and CREATIVE DIRECTION of what they've entered, then suggest fitting content for each empty field.

What they've filled in:
${filledDesc}
${styleContext}
${palContext}
${kwContext}

Empty fields to suggest for: ${emptyDesc}

Rules:
- Match the vibe, mood, and creative direction of the filled fields
- Be specific and evocative, not generic
- For each field, give exactly 3 short suggestions (2-5 words each)
- Make suggestions that complement what's already there
- Consider the template type (${tpl.n}) when suggesting

Respond with ONLY valid JSON, no markdown, no backticks:
{${empty.map(e => '"' + e.key + '":["suggestion1","suggestion2","suggestion3"]').join(',')}}`;

  try {
    const resp = await fetch(API_CONFIG.baseUrl + '/ai/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'gpt-4o-mini',
        messages: [
          { role: 'system', content: sysPrompt },
          { role: 'user', content: 'Suggest content for my empty fields based on the vibe of what I have so far.' }
        ],
        max_tokens: 400,
        temperature: 0.85
      })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error.message || 'API error');
    let raw = data.choices[0].message.content.trim();
    raw = raw.replace(/^```json\s*/, '').replace(/```$/, '').trim();
    const suggestions = JSON.parse(raw);
    
    // Render suggestion chips under each empty field
    empty.forEach(field => {
      const suggs = suggestions[field.key];
      if (!suggs || !suggs.length) return;
      
      // Find the field input by looking for its placeholder
      const allInputs = document.querySelectorAll('.fi');
      allInputs.forEach(inp => {
        if (inp.placeholder === field.placeholder || inp.placeholder.includes(field.placeholder.split('...')[0])) {
          // Remove old suggestions
          const oldRow = inp.parentElement.querySelector('.ai-suggest-row');
          if (oldRow) oldRow.remove();
          
          const row = document.createElement('div');
          row.className = 'ai-suggest-row';
          suggs.forEach(s => {
            const chip = document.createElement('button');
            chip.className = 'ai-suggest-chip';
            chip.textContent = '✨ ' + s;
            chip.onclick = function() {
              inp.value = s;
              inp.dispatchEvent(new Event('input'));
              row.remove();
            };
            row.appendChild(chip);
          });
          inp.parentElement.appendChild(row);
        }
      });
    });
    
    toast('AI suggestions added!', 'success');
  } catch (e) {
    toast('Suggest failed: ' + e.message, 'warn');
  }
  
  aiSuggestLoading = false;
  if (btn) { btn.disabled = false; btn.innerHTML = '✨ AI Suggest<span class="pro-tag">PRO</span>'; }
}

function handleTattooClientPhoto(files) {
  if (!files || !files.length) return;
  const file = files[0];
  if (file.size > 10 * 1024 * 1024) { toast('Image too large (max 10MB)', 'warn'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    tattooClientImage = e.target.result;
    renderTattooMockup();
    toast('Client photo uploaded', 'success');
  };
  reader.readAsDataURL(file);
}
